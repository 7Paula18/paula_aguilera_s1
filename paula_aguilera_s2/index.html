<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ficha Técnica | Semana 2</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="card">
    <div class="card-header">
        <h3>Ficha Técnica: FinTech</h3>
    </div>
    <div class="card-body">
        <div class="data-row">
            <span class="label">Activo:</span>
            <span id="display-name" class="value"></span> </div>
        <div class="data-row">
            <span class="label">Categoría:</span>
            <span id="display-cat" class="value"></span>
        </div>
        <div class="data-row">
            <span class="label">Monto Principal:</span>
            <span id="display-qty" class="value"></span>
        </div>
        <div class="data-row">
            <span class="label">Estado Mercado:</span>
            <span id="display-bool" class="value"></span>
        </div>
    </div>
    <div class="card-footer">
        <small id="display-footer"></small>
    </div>
</div>

<script src="./script.js"></script>
</body>
</html>
